<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sakin Arama</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Sakin Arama">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f1ede3">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f1ede3;
    --paper: #faf8f2;
    --ink: #20211c;
    --muted: #7c7a6e;
    --line: #d8d3c4;
    --clay: #b8492f;
    --clay-soft: #e8d6cf;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body { height: 100%; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    padding: calc(env(safe-area-inset-top) + 56px) 22px calc(env(safe-area-inset-bottom) + 32px);
    background-image:
      radial-gradient(circle at 15% 12%, rgba(184,73,47,0.06), transparent 50%),
      radial-gradient(circle at 88% 88%, rgba(124,122,110,0.08), transparent 55%);
    -webkit-text-size-adjust: 100%;
  }

  .wrap {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    animation: rise 0.6s cubic-bezier(0.2, 0.7, 0.2, 1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .mark {
    font-family: 'Fraunces', serif;
    font-size: 2.7rem;
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1.05;
  }
  .mark .dot { color: var(--clay); }

  .sub {
    color: var(--muted);
    font-size: 0.95rem;
    margin-top: 10px;
    margin-bottom: 28px;
  }

  .search-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 6px;
    box-shadow: 0 14px 34px -26px rgba(32,33,28,0.5);
  }
  .search-card:focus-within { border-color: var(--clay); }

  input[type="text"] {
    width: 100%;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 17px;
    color: var(--ink);
    padding: 16px 14px;
    outline: none;
  }
  input::placeholder { color: var(--muted); }

  button.go {
    width: 100%;
    border: none;
    background: var(--clay);
    color: #faf8f2;
    font-family: 'DM Sans', sans-serif;
    font-size: 1.05rem;
    font-weight: 500;
    padding: 17px;
    border-radius: 13px;
    cursor: pointer;
    margin-top: 8px;
    transition: transform 0.1s ease, background 0.2s ease;
  }
  button.go:active { transform: scale(0.98); background: #9e3c25; }

  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
  }

  .chip {
    flex: 1;
    min-width: calc(50% - 4px);
    border: 1px solid var(--line);
    background: var(--paper);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    padding: 12px 8px;
    border-radius: 11px;
    cursor: pointer;
    transition: all 0.16s ease;
  }
  .chip:active { transform: scale(0.97); }
  .chip.active {
    background: var(--clay-soft);
    border-color: var(--clay);
    color: var(--clay);
    font-weight: 500;
  }

  .links-title {
    margin-top: 34px;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .links {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .links a {
    display: block;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 13px;
    padding: 16px 14px;
    color: var(--ink);
    text-decoration: none;
    font-size: 0.95rem;
    font-weight: 500;
    transition: transform 0.1s ease, border-color 0.16s ease;
  }
  .links a:active { transform: scale(0.97); border-color: var(--clay); }

  .note {
    margin-top: 30px;
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.65;
  }
  .note b { color: var(--ink); font-weight: 500; }
</style>
</head>
<body>
  <div class="wrap">
    <h1 class="mark">Sakin Arama<span class="dot">.</span></h1>
    <p class="sub">Akış yok, öneri yok. Sadece aradığın video.</p>

    <div class="search-card">
      <input type="text" id="q" placeholder="Ne aramak istiyorsun?" autocomplete="off" enterkeyhint="search">
    </div>
    <button class="go" id="goBtn">Ara</button>

    <div class="filters">
      <button class="chip active" data-sp="">Hepsi</button>
      <button class="chip" data-sp="EgIQAQ%3D%3D">Videolar</button>
      <button class="chip" data-sp="EgIQAg%3D%3D">Kanallar</button>
      <button class="chip" data-sp="EgIQAw%3D%3D">Listeler</button>
    </div>

    <p class="links-title">Hızlı erişim</p>
    <nav class="links">
      <a href="https://m.youtube.com/feed/subscriptions">Abonelikler</a>
      <a href="https://m.youtube.com/playlist?list=WL">Daha sonra izle</a>
      <a href="https://m.youtube.com/playlist?list=LL">Beğenilenler</a>
      <a href="https://m.youtube.com/feed/history">Geçmiş</a>
    </nav>

    <p class="note">
      İpucu: YouTube uygulamasında <b>izleme geçmişini duraklatırsan</b>
      ana sayfa boş açılır ve hiç video önermez.
    </p>
  </div>

<script>
  let sp = "";

  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      sp = chip.dataset.sp;
    });
  });

  function search() {
    const term = document.getElementById('q').value.trim();
    if (!term) return;
    let url = 'https://m.youtube.com/results?search_query=' + encodeURIComponent(term);
    if (sp) url += '&sp=' + sp;
    window.location.href = url;
  }

  document.getElementById('goBtn').addEventListener('click', search);
  document.getElementById('q').addEventListener('keydown', e => {
    if (e.key === 'Enter') search();
  });
</script>
</body>
</html>
